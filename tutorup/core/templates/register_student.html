{% extends 'base.html' %}
{% load static %}

{% block content %}
<h2>Student Registration</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Register</button>
    
</form>

<p style="margin-top: 10px;">
    Already have an account? 
    <a href="{% url 'login' %}">Login here</a>
</p>
{% endblock %}

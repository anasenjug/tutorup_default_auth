<div 
    id="contact-form-wrapper"
    x-data="{ sent: {{ sent|yesno:'true,false' }} }"
    x-init="$nextTick(() => { sent = {{ sent|yesno:'true,false' }} })"
    x-cloak
>
    <!-- Success message -->
    <div 
        x-show="sent" 
        x-transition:enter="transition ease-out duration-300"
        x-transition:enter-start="opacity-0 transform scale-95"
        x-transition:enter-end="opacity-100 transform scale-100"
        class="alert bg-tumedblue text-white rounded-3 p-4 text-center shadow-sm"
    >
        <h4 class="mb-2 fw-bold">Message sent successfully!</h4>
        <p class="mb-0 small opacity-90">Thanks for contacting us — we’ll get back to you soon.</p>
    </div>

    <!-- Contact form -->
    <form
        x-show="!sent"
        x-transition.opacity.duration.200ms
        hx-post="{% url 'contact_us' %}"
        hx-target="#contact-form-wrapper"
        hx-swap="outerHTML"
        hx-indicator="#form-loading-spinner"
        class="mt-3"
    >
        {% csrf_token %}
        
        <!-- Extends the CSS styling rules from custom.css onto Django form tags -->
        <div class="bootstrap-form-container">
            {{ form.as_p }}
            
            <div class="text-center text-md-start">
                <button type="submit" hx-disabled-elt="this" class="d-inline-flex align-items-center justify-content-center gap-2 btn btn-tuorange">
                    <span>Send Message</span>

                    <div id="form-loading-spinner" class="spinner-border spinner-border-sm htmx-indicator" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </button>
            </div>
        </div>
    </form>
</div>

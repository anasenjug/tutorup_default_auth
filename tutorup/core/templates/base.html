{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TutorUp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/custom.css' %}">
    <!-- Include Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Include Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous" defer></script>
    <!-- Custom CSS for banner -->
    <script src="https://unpkg.com/htmx.org@1.8.4"></script>
</head>   
<body>
    <nav class="navbar navbar-expand-lg navbar-light fs-5 bg-tudarkblue">
        <div class="container-fluid">
            <a class="navbar-brand" style="padding: 15px;" href="/">
                <img src= "{% static 'images/TutorUp.svg' %}" alt="tutor up logo" >
            </a>
            <div class="me-auto">
                {% if not user.is_authenticated or user.user_type == 'student' %}
                    <a href="{% url 'register_tutor' %}" class="text-light">Become a tutor</a>
                {% endif %}
            </div>
            <div class="d-flex justify-content-end align-items-center" x-data="{ userLoggedIn: {{ user.is_authenticated|yesno:'true,false' }}, userType: '{{ user.profile.user_type|default:'' }}' }">
                <template x-if="!userLoggedIn">
                    <div class="d-flex">
                        <a class="nav-link me-4 text-light" href="{% url 'login' %}">Login</a>
                        <a class="nav-link ms-4 text-light" href="{% url 'register_student' %}">Register</a>
                    </div>
                </template>
                <template x-if="userLoggedIn">
                    <div class="d-flex">
                        {% if user.is_authenticated and user.user_type == 'tutor' %}
                            <a href="{% url 'tutor_profile_view' user.id %}" class="nav-link me-4">My Profile</a>
                        {% endif %}
                        <form action="{% url 'logout' %}" method="post" style="display:none;">
                            {% csrf_token %}
                            <button type="submit" id="logoutBtn"></button>
                        </form>
                        <button class="nav-link ms-4 text-light" onclick="document.getElementById('logoutBtn').click();">
                            Logout
                        </button>
                            
                    </div>
                </template>
            </div>
        </div>
    </nav>

    {% block banner %}
    {% endblock %}

    {% block content %}
    {% endblock %}



<footer>
    <div class="d-flex justify-content-center">
        <a href="#">
        <div class="icon-containerimgs" style="padding:10px;">
        <line y1="0.5" x2="1621" y2="0.5" stroke="#365295"/>
        <img src="{% static 'images/facebook.svg' %}" alt="facebook logo">
         </div>
        </a>
         <a href="#">
        <div class="icon-containerimgs" style="padding:10px;">
            <img src="{% static 'images/insta.svg' %}" alt="instagram logo">
        </div>
            </a>
            <a href="#">
        <div class="icon-containerimgs" style="padding:10px;">            
            <img src="{% static 'images/whatsapp.svg' %}" alt="whatsapp logo">
        </div>
    </a>

</div>
<div class="d-flex justify-content-center footer-links">
    <div class="icon-container"><a href="{% url 'contact_us' %}">Contact</a></div>
    <div class="icon-container"><a href="{% url 'about_us' %}">About Us</a></div>   
    <div class="icon-container"><a href="#">Careers</a></div>   
        
</div>        

</footer>
</body>
</html>

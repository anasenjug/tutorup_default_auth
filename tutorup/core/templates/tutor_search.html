{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row g-4">
        
        <div class="col-md-3">
            <div class="card shadow-sm p-4 bg-tulightblue border-0 bootstrap-form-container">
                <h5 class="mb-3 text-tudarkblue fw-bold text-uppercase tracking-wider border-bottom pb-2" style="font-size: 0.9rem;">
                    Filter Tutors
                </h5>
                
                <form 
                    hx-get="{% url 'tutor_search' %}" 
                    hx-target="#search-results" 
                    hx-swap="outerHTML show:window:top">
                    
                    {% for field in form %}
                        <div class="mb-3">
                            <label for="{{ field.id_for_label }}">
                                {{ field.label }}
                            </label>
                            
                            {{ field }}
                            
                            {% if field.errors %}
                                <div class="errorlist mt-1">
                                    {% for error in field.errors %}
                                        <small class="error d-block">{{ error }}</small>
                                    {% endfor %}
                                </div>
                            {% endif %}
                        </div>
                    {% endfor %}
                    
                    <button type="submit" class="btn btn-tuorange text-white rounded-pill px-4 py-2 fw-bold w-100 m-0 text-nowrap mt-2" style="height: 46px;">
                        Apply Filters
                    </button>
                </form>
            </div>
        </div>
        
        <div class="col-md-9">
            {% include "partials/tutor_search_results.html" %}
        </div>

    </div>
</div>
{% endblock %}
